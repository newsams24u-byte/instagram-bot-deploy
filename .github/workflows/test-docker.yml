name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: instagram-bot:latest
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image and test
        run: |
          docker load --input /tmp/image.tar
          echo "✅ Docker image built successfully"
          docker images | grep instagram-bot

      - name: Test image startup
        run: |
          docker run --rm -d --name test-container -p 5000:5000 instagram-bot:latest > /dev/null
          sleep 3
          docker ps | grep test-container && echo "✅ Container started successfully" || exit 1
          docker logs test-container | head -10
          docker stop test-container || true
