<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post Manager - Bangalore Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📸 Instagram Post Manager</h1>
                <p>Bangalore News Bot - Approve & Post Content</p>
            </div>
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-label">Pending</span>
                    <span class="stat-value pending-count">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Approved</span>
                    <span class="stat-value approved-count">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Posted</span>
                    <span class="stat-value posted-count">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Rejected</span>
                    <span class="stat-value rejected-count">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="pending">📋 Pending Posts</button>
                <button class="tab-btn" data-tab="history">✅ Posted History</button>
            </div>

            <!-- Tab Content -->
            <div class="tab-content">
                <!-- Pending Posts Tab -->
                <div id="pending" class="tab-pane active">
                    <div class="tab-header">
                        <h2>Pending Posts - Drag to Reorder</h2>
                        <div class="actions">
                            <button id="refresh-btn" class="btn btn-secondary">🔄 Refresh</button>
                            <button id="auto-post-all" class="btn btn-success">📤 Post All Approved</button>
                        </div>
                    </div>

                    <!-- Posts List -->
                    <div id="posts-list" class="posts-container sortable">
                        <!-- Posts will be loaded here -->
                    </div>

                    <div id="no-posts" class="empty-state">
                        <p>📭 No pending posts. Posts will appear here when generated!</p>
                    </div>
                </div>

                <!-- History Tab -->
                <div id="history" class="tab-pane">
                    <div class="tab-header">
                        <h2>Posted History</h2>
                        <button id="refresh-history" class="btn btn-secondary">🔄 Refresh</button>
                    </div>

                    <div id="history-list" class="posts-container">
                        <!-- History will be loaded here -->
                    </div>

                    <div id="no-history" class="empty-state">
                        <p>📭 No posted content yet</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Post Caption</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modal-image" src="" alt="Post Image" class="modal-image">
                <textarea id="modal-caption" class="caption-input" placeholder="Enter post caption..."></textarea>
                <div class="char-count">
                    <span id="char-counter">0</span> / 2200 characters
                </div>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                <button id="modal-save" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
